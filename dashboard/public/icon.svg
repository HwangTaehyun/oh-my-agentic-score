<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="borderGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00FF88;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#00CC6A;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="fillGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1f2e;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#111827;stop-opacity:1"/>
    </linearGradient>
  </defs>
  <!-- Outer hexagon (green border) -->
  <polygon
    points="256,28 462,148 462,364 256,484 50,364 50,148"
    fill="url(#borderGrad)"
  />
  <!-- Inner hexagon (dark fill) -->
  <polygon
    points="256,52 440,160 440,352 256,460 72,352 72,160"
    fill="url(#fillGrad)"
  />
  <!-- Letter A -->
  <text
    x="210"
    y="340"
    font-family="Arial, Helvetica, sans-serif"
    font-weight="bold"
    font-size="260"
    fill="white"
    text-anchor="middle"
  >A</text>
  <!-- Play arrow -->
  <polygon
    points="310,190 420,268 310,346"
    fill="#00FF88"
    opacity="0.9"
  />
</svg>
